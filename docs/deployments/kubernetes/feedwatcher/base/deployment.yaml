apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcecode-editor
  labels:
    app: sourcecode-editor
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: sourcecode-editor
  template:
    metadata:
      labels:
        app: sourcecode-editor
    spec:
      containers:
        - image: sourcecode-editor
          name: sourcecode-editor
          resources:
            limits:
              memory: 500Mi
              cpu: 1
            requests:
              memory: 20Mi
              cpu: 100m
          volumeMounts:
            - mountPath: /data
              name: pod-volume
          imagePullPolicy: Always
      volumes:
        - name: pod-volume
          persistentVolumeClaim:
            claimName: sourcecode-editor
