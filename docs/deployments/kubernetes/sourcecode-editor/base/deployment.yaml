apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcecode-editor
  labels:
    app: sourcecode-editor
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: sourcecode-editor
  template:
    metadata:
      labels:
        app: sourcecode-editor
    spec:
      serviceAccountName: sourcecode-editor-role
      containers:
        - image: sourcecode-editor
          name: sourcecode-editor
          env:
            - name: APPLICATION_TITLE
              value: Code
          resources:
            limits:
              memory: 500Mi
              cpu: 1
            requests:
              memory: 20Mi
              cpu: 100m
          volumeMounts:
            - mountPath: /data
              name: pod-volume
            - name: config-volume
              mountPath: /opt/app/sourcecode-editor/config.json
              subPath: config.json
          imagePullPolicy: Always
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: pod-volume
          persistentVolumeClaim:
            claimName: sourcecode-editor
        - name: config-volume
          configMap:
            name: sourcecode-editor-config
